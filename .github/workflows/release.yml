name: Build & Release

on:
  push:
    tags:
      - 'v*'

env:
  FLUTTER_VERSION: "3.38.10"

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v4
        with:
          version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Flutter pub get (app)
        working-directory: app
        run: flutter pub get

      - name: Build runner
        working-directory: app
        run: dart run build_runner build -d

      - name: Build Android APK
        working-directory: app
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: localsend-android-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: app/build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true

  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v4
        with:
          version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Flutter pub get (app)
        working-directory: app
        run: flutter pub get

      - name: Build runner
        working-directory: app
        run: dart run build_runner build -d

      - name: Build Windows
        working-directory: app
        run: flutter build windows --release

      - name: Build MSIX package
        shell: pwsh
        run: |
          cd app
          dart run msix:create

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: localsend-windows-msix
          path: app/build/windows/runner/Release/*.msix

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            app/build/windows/runner/Release/*.msix
          generate_release_notes: false

  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Flutter SDK
        uses: flutter-actions/setup-flutter@v4
        with:
          version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Flutter pub get (app)
        working-directory: app
        run: flutter pub get

      - name: Build runner
        working-directory: app
        run: dart run build_runner build -d

      - name: Build Linux
        working-directory: app
        run: flutter build linux --release

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: app/build/linux/x64/release/bundle/
          generate_release_notes: false

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List artifacts
        run: ls -laR

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            localsend-android-apk/app-release.apk
            localsend-windows-msix/*.msix
          generate_release_notes: true
          append_body: true

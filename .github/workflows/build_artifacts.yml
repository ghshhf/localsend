name: Build Artifacts

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.38.10"

jobs:
  build-android:
    name: Android APK
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6

      - name: Remove proprietary dependencies
        run: sh scripts/remove_proprietary_dependencies.sh

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Dependencies
        working-directory: app
        run: flutter pub get

      - name: Build APK (debug)
        working-directory: app
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: localsend-android
          path: app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 15

  build-windows:
    name: Windows MSIX
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Dependencies
        working-directory: app
        run: flutter pub get

      - name: Build Windows
        working-directory: app
        run: flutter build windows --release

      - name: Build MSIX
        shell: pwsh
        working-directory: app
        run: dart run msix:create

      - name: Upload Windows
        uses: actions/upload-artifact@v6
        with:
          name: localsend-windows
          path: app/build/windows/runner/Release/*.msix
          retention-days: 15

  build-linux:
    name: Linux AppImage
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake libgtk-3-dev ninja-build libayatana-appindicator3-dev libfuse2

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Dependencies
        working-directory: app
        run: flutter pub get

      - name: Build generated files
        working-directory: app
        run: dart run build_runner build -d

      - name: Build Linux
        working-directory: app
        run: flutter build linux

      - name: Prepare AppDir
        working-directory: app
        run: |
          mkdir -p AppDir
          cp -r build/linux/x64/release/bundle/* AppDir/
          mkdir -p AppDir/usr/share/icons/hicolor/32x32/apps
          cp assets/img/logo-32.png AppDir/usr/share/icons/hicolor/32x32/apps/localsend.png
          mkdir -p AppDir/usr/share/icons/hicolor/128x128/apps
          cp assets/img/logo-128.png AppDir/usr/share/icons/hicolor/128x128/apps/localsend.png
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp assets/img/logo-256.png AppDir/usr/share/icons/hicolor/256x256/apps/localsend.png

      - name: Build AppImage
        uses: AppImageCrafters/build-appimage@57c3bc6963f870ce3be103117de5b5e33ffbaeb6
        with:
          recipe: ./app/AppImageBuilder.yml

      - name: Upload Linux
        uses: actions/upload-artifact@v6
        with:
          name: localsend-linux
          path: ./app/*.AppImage
          retention-days: 15
